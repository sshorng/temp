<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國文段考複習 · 江湖對決</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#2c2416; --paper:#f7f2e6; --paper-dark:#ede4d0;
  --red:#b53b2c; --red-light:#e85d4a; --gold:#c9a84c; --gold-light:#f0dda0;
  --green:#3a7d5a; --green-light:#6bcf8a; --blue:#3a5f8a; --blue-light:#7ab0d4;
  --shadow:rgba(44,36,22,.12);
}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(180deg,#0d0a06 0%,#1a1510 40%,#2a2218 100%);min-height:100vh;color:var(--ink);overflow-x:hidden;font-size:17px}
.screen{display:none;min-height:100vh;max-width:960px;margin:0 auto;padding:0 16px 24px}
.screen.active{display:block;animation:enter .45s ease}
@keyframes enter{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ===== HOME ===== */
.home-scene{position:relative;padding-top:60px;text-align:center}
.home-scene::before{content:'⛰️';position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:100px;opacity:.12;pointer-events:none}
.home-icon{width:90px;height:90px;margin:0 auto 12px;background:linear-gradient(135deg,#c9a84c,#8a7540);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 8px 32px rgba(201,168,76,.3);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-title{font-family:'Noto Serif TC',serif;font-size:42px;font-weight:900;color:#f0e8d8;letter-spacing:8px;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.home-sub{color:#a09078;margin-top:8px;font-size:17px;letter-spacing:3px}
.home-rule{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 24px;margin:28px auto 0;max-width:560px;text-align:left;color:#c8b898;font-size:16px;line-height:1.8}
.home-rule strong{color:var(--gold)}
.lesson-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px auto;max-width:600px}
.lc{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;transition:all .25s;color:#c0b098}
.lc:hover{background:rgba(255,255,255,.08);border-color:var(--gold);transform:translateY(-3px)}.lc.selected{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold-light)}
.lc .num{font-size:13px;opacity:.5}.lc .name{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;margin-top:6px}
.lc .tag{display:inline-block;margin-top:6px;font-size:13px;padding:2px 14px;border-radius:20px;color:#fff;opacity:.8}
.lc .tag.t7{background:#b53b2c}.lc .tag.t8{background:#3a5f8a}.lc .tag.t9{background:#3a7d5a}.lc .tag.t10{background:#7a4fa0}.lc .tag.tz{background:#c0843c}
.lc-all{grid-column:span 3;background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(181,59,44,.05));border-color:var(--gold)}
.start-btn{display:block;width:100%;max-width:400px;margin:20px auto 0;padding:18px;background:linear-gradient(135deg,var(--red),#8a2e20);color:#fff;border:none;border-radius:18px;font-size:22px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:3px;box-shadow:0 4px 24px rgba(181,59,44,.3);transition:all .25s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(181,59,44,.4)}

/* ===== BATTLE ===== */
.battle-scene{position:relative}
.bg-mountains{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-mountains::before{content:'⛰️🏔️⛰️';position:absolute;bottom:0;left:-20px;font-size:160px;opacity:.04;letter-spacing:-10px}
.bg-mountains::after{content:'🌫️';position:absolute;top:10%;right:10%;font-size:80px;opacity:.03}

/* HP bar */
.hp-section{display:flex;gap:12px;margin-bottom:14px;position:relative;z-index:1;align-items:center}
.hp-player{flex:1;text-align:center}
.hp-boss{flex:1;text-align:center}
.hp-label{color:#c0b098;font-size:14px;font-weight:600;letter-spacing:1px;margin-bottom:4px}
.hp-label span{opacity:.6}
.hp-bar{height:18px;border-radius:10px;background:rgba(255,255,255,.08);overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.06)}
.hp-bar .fill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.hp-fill-player{background:linear-gradient(90deg,#3a7d5a,#5cb885)}
.hp-fill-boss{background:linear-gradient(90deg,#b53b2c,#e85d4a)}
.hp-text{font-size:26px;font-weight:700;color:#f0e8d8;margin-top:4px;font-family:'Noto Serif TC',serif}

/* VS DIVIDER */
.vs-divider{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#8a7540);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#0d0a06;flex-shrink:0;box-shadow:0 0 20px rgba(201,168,76,.2)}

/* battle arena */
.battle-arena{position:relative;z-index:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:28px;backdrop-filter:blur(6px);min-height:420px}
.battle-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.bt-left{display:flex;align-items:center;gap:10px}.bt-left .back{border:none;background:rgba(255,255,255,.06);color:#a09078;width:40px;height:40px;border-radius:12px;font-size:20px;cursor:pointer;transition:all .2s}.bt-left .back:hover{background:rgba(255,255,255,.12)}
.q-progress{color:#a09078;font-size:16px;font-weight:500}
.streak-display{padding:4px 16px;border-radius:16px;font-size:15px;font-weight:600}
.streak-display.on{background:rgba(201,168,76,.15);color:var(--gold-light)}
.streak-display.off{background:rgba(255,255,255,.04);color:#605848}

/* Question */
.q-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:14px}
.q-badge.l7{background:rgba(181,59,44,.15);color:#e87a6a}
.q-badge.l8{background:rgba(58,95,138,.15);color:#7ab0d4}
.q-badge.l9{background:rgba(58,125,90,.15);color:#6bcf8a}
.q-badge.l10{background:rgba(122,79,160,.15);color:#b080cc}
.q-badge.lz{background:rgba(192,132,60,.15);color:#e0b060}
.q-type-badge{font-size:14px;color:#a09078;background:rgba(255,255,255,.04);padding:3px 12px;border-radius:8px;margin-bottom:12px;display:inline-block}
.q-text{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:600;color:#f0e8d8;line-height:1.8;margin-bottom:20px}

/* Options */
.options{display:grid;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:14px 18px;border:2px solid rgba(255,255,255,.08);border-radius:14px;cursor:pointer;transition:all .2s;color:#d8d0c0;background:rgba(255,255,255,.02);font-size:16px;line-height:1.6}
.opt:hover{background:rgba(255,255,255,.06);border-color:rgba(201,168,76,.3)}
.opt .l{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#a09078;flex-shrink:0}
.opt.correct{background:rgba(58,125,90,.15);border-color:var(--green);color:#8be0aa}
.opt.correct .l{background:var(--green);color:#fff}
.opt.wrong{background:rgba(181,59,44,.15);border-color:var(--red);color:#e87a6a}
.opt.wrong .l{background:var(--red);color:#fff}
.opt.disabled{pointer-events:none}

/* TF */
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tf-btn{padding:18px;border:2px solid rgba(255,255,255,.08);border-radius:16px;cursor:pointer;text-align:center;font-size:20px;font-weight:700;transition:all .2s;background:rgba(255,255,255,.02);color:#d8d0c0}
.tf-btn:hover{background:rgba(255,255,255,.06);border-color:rgba(201,168,76,.3)}
.tf-btn.correct{background:rgba(58,125,90,.15);border-color:var(--green);color:#8be0aa}
.tf-btn.wrong{background:rgba(181,59,44,.15);border-color:var(--red);color:#e87a6a}
.tf-btn.disabled{pointer-events:none}

/* Boss speech bubble */
.boss-speech{position:absolute;top:-20px;right:10px;z-index:20;max-width:280px;animation:bsIn .3s ease;background:rgba(20,15,10,.92);border:1px solid var(--gold);border-radius:16px 4px 16px 16px;padding:12px 16px;backdrop-filter:blur(8px)}
@keyframes bsIn{from{opacity:0;transform:translateY(10px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.boss-speech .bs-name{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:4px}
.boss-speech .bs-text{font-size:16px;color:#e8ddd0;line-height:1.5;font-family:'Noto Serif TC',serif}
.boss-speech .bs-arrow{position:absolute;bottom:-8px;right:20px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid rgba(20,15,10,.92)}

/* Explanation */
.explain-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 18px;margin-top:14px;position:relative;z-index:1}
.explain-box .e-label{font-size:13px;color:var(--gold);font-weight:600;letter-spacing:1px;margin-bottom:4px}
.explain-box .e-text{font-size:16px;color:#b8a890;line-height:1.7}

/* BATTLE EFFECTS */
.hit-effect{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:99;display:flex;align-items:center;justify-content:center;font-size:80px;animation:slash .5s ease forwards}
@keyframes slash{0%{opacity:1;transform:scale(.5) rotate(-10deg)}50%{opacity:1;transform:scale(1.3) rotate(5deg)}100%{opacity:0;transform:scale(1.5) rotate(0deg)}}
@keyframes fbFlash{0%{opacity:1}100%{opacity:0}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.damage-popup{position:absolute;font-size:32px;font-weight:900;pointer-events:none;z-index:10;animation:dmgPop .8s ease forwards;font-family:'Noto Serif TC',serif}
@keyframes dmgPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
.boss-shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.player-shake{animation:pShake .4s ease}
@keyframes pShake{0%,100%{transform:translateX(0)}20%{transform:translateX(5px)}40%{transform:translateX(-5px)}60%{transform:translateX(3px)}80%{transform:translateX(-3px)}}

/* BOSS face */
.boss-face{position:absolute;right:20px;top:-50px;font-size:80px;opacity:.2;pointer-events:none;animation:float 4s ease-in-out infinite}
.player-face{position:absolute;left:20px;top:-50px;font-size:70px;opacity:.15;pointer-events:none;animation:float 4s ease-in-out infinite 1s}

/* ===== RESULT ===== */
.res-scene{text-align:center;padding-top:40px}
.res-badge{font-size:72px;margin-bottom:8px}
.res-title{font-family:'Noto Serif TC',serif;font-size:36px;font-weight:900;color:#f0e8d8;letter-spacing:4px}
.res-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px auto;max-width:500px}
.rs{padding:14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.rs .n{font-size:32px;font-weight:900;font-family:'Noto Serif TC',serif}.rs .l{font-size:13px;color:#908070;margin-top:3px}
.res-bar-wrap{height:8px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;margin:4px auto 0;max-width:200px}
.res-bar-fill{height:100%;border-radius:6px;transition:width 1s ease}
.res-actions{display:flex;gap:10px;justify-content:center;margin-top:24px}
.res-btn{padding:12px 28px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;color:#fff}
.res-btn.again{background:linear-gradient(135deg,var(--blue),#2a4a6a)}.res-btn.home{background:rgba(255,255,255,.08);color:#c0b098}.res-btn:hover{transform:translateY(-2px)}

/* next-btn inline */
.next-btn{margin-top:16px;padding:12px 36px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;color:#fff;transition:all .2s;background:var(--green);display:block;width:100%}
.next-btn:hover{transform:translateY(-2px)}

@media(max-width:500px){
  .lesson-grid{grid-template-columns:repeat(2,1fr)}.lc-all{grid-column:span 2}
  .hp-section{gap:6px}.q-text{font-size:16px}.opt{font-size:14px}
  .res-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- BG MOUNTAINS -->
<div class="bg-mountains"></div>

<!-- ===== HOME ===== -->
<div class="screen active" id="home">
  <div class="home-scene">
    <div class="home-icon">⚔️</div>
    <div class="home-title">江湖對決</div>
    <div class="home-sub">康軒八下 · 段考複習</div>
    <div class="home-rule">
      <strong>🏮 規則</strong><br>
      選定關卡，與課文BOSS對決。答對出招攻擊，答錯被BOSS反擊。<br>
      連續命中可發動 <strong>🔥 combo</strong> 造成更多傷害！<br>
      擊敗 BOSS 即過關，血量歸零則挑戰失敗。
    </div>
    <div class="lesson-grid" id="homeGrid">
      <div class="lc" data-l="7"><div class="num">第七關</div><div class="name">陋室銘</div><div class="tag t7">劉禹錫</div></div>
      <div class="lc" data-l="8"><div class="num">第八關</div><div class="name">成功是失敗之母</div><div class="tag t8">論說文</div></div>
      <div class="lc" data-l="9"><div class="num">第九關</div><div class="name">罐頭由來</div><div class="tag t9">周惠民</div></div>
      <div class="lc" data-l="10"><div class="num">第十關</div><div class="name">項鍊</div><div class="tag t10">莫泊桑</div></div>
      <div class="lc" data-l="z3"><div class="num">自學三</div><div class="name">空城計</div><div class="tag tz">羅貫中</div></div>
      <div class="lc lc-all" data-l="all"><div class="num">⚡ 終極</div><div class="name">大亂鬥</div><div class="tag" style="background:linear-gradient(90deg,#b53b2c,#c9a84c)">76題</div></div>
    </div>
    <button class="start-btn" id="homeStart">🤺 進入江湖</button>
  </div>
</div>

<!-- ===== BATTLE ===== -->
<div class="screen" id="battle">
  <div class="battle-scene">
    <!-- HP -->
    <div class="hp-section">
      <div class="hp-player"><div class="hp-label">👤 你 <span>HP</span></div><div class="hp-bar"><div class="fill hp-fill-player" id="playerHP" style="width:100%"></div></div><div class="hp-text" id="playerHPText">100</div></div>
      <div class="vs-divider">VS</div>
      <div class="hp-boss"><div class="hp-label"><span id="bossNameLabel">BOSS</span> <span>HP</span></div><div class="hp-bar"><div class="fill hp-fill-boss" id="bossHP" style="width:100%"></div></div><div class="hp-text" id="bossHPText">100</div></div>
    </div>
    <!-- Arena -->
    <div class="battle-arena" id="arena">
      <div class="battle-top">
        <div class="bt-left">
          <button class="back" id="battleBack">✕</button>
          <span class="q-progress" id="qProgress">第 1 題</span>
        </div>
        <div class="streak-display off" id="streakDsp">🔥 0</div>
      </div>
      <div id="questionSlot"></div>
    </div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div class="screen" id="result">
  <div class="res-scene">
    <div class="res-badge" id="resBadge">🏆</div>
    <div class="res-title" id="resTitle">勝利！</div>
    <div class="res-stats" id="resStats"></div>
    <div class="res-actions">
      <button class="res-btn again" id="resAgain">🔄 再戰一次</button>
      <button class="res-btn home" id="resHome">🏠 回首頁</button>
    </div>
  </div>
</div>

<script>
// ============ QUESTION BANK ============
// 題型多元：選擇題(mc)、是非題(tf)
// 涵蓋：字音字形、修辭辨析、文意理解、寫作手法、成語應用
// 刪除：作者是誰、太淺的常識題
// 注意：正確選項不一定是句子最長的
const ALL_Q = {
 7: [
{t:'mc',q:'「斯是陋室，惟吾德馨」的「馨」字讀音為何？',o:['ㄒㄧㄣ','ㄒㄧㄥ','ㄑㄧㄥ','ㄒㄧㄣˊ'],a:0},
{t:'mc',q:'「苔痕上階綠」的「苔」與「 」字讀音相同？',o:['抬（ㄊㄞˊ）','怠（ㄉㄞˋ）','冶（ㄧㄝˇ）','始（ㄕˇ）'],a:0},
{t:'mc',q:'「案牘」是借代，它借代的是什麼？',o:['公文書卷','桌椅家具','法院案件','經典書籍'],a:0},
{t:'mc',q:'「無絲竹之亂耳」的「絲竹」運用何種修辭？',o:['借代—以樂器借代音樂','譬喻—將聲音比作絲竹','轉化—將無形聲音擬物','誇飾—誇大樂器聲響'],a:0},
{t:'mc',q:'「白丁」一詞在文中運用借代，所指為何？',o:['無學問的俗人','不識字的平民','穿白衣的百姓','在家的閒人'],a:0,exp:'白丁借代「無學問的俗人」，非歧視平民，而是強調學術交流的對象。'},
{t:'tf',q:'「苔痕上階綠」的「上」字和「草色入簾青」的「入」字，皆運用了轉化修辭（擬動）。',a:true,exp:'「上」和「入」將靜態的苔蘚和草色寫得具有動態感，是轉化中的擬動。'},
{t:'mc',q:'「山不在高，有仙則名；水不在深，有龍則靈」在寫作上稱為：',o:['起興類比—以自然現象引發主旨','排比—三句以上結構整齊','誇飾—誇大山水的價值','設問—自問自答引思考'],a:0},
{t:'mc',q:'「談笑有鴻儒，往來無白丁」使用了哪兩種修辭？',o:['對偶＋映襯','排比＋層遞','轉化＋擬人','引用＋設問'],a:0},
{t:'mc',q:'劉禹錫寫「南陽諸葛廬，西蜀子雲亭」的用意為何？',o:['以古賢自比，暗指自己德行出眾','表達對諸葛亮和揚雄的崇拜','暗示自己也想搬到南方居住','引用典故來增加文章篇幅'],a:0},
{t:'mc',q:'「何陋之有」屬於何種句型？',o:['反詰句，答案已在問中','疑問句，等待對方回答','設問句，自問自答','祈使句，要求他人行動'],a:0},
{t:'mc',q:'劉禹錫引用「何陋之有」卻省略「君子居之」，效果為何？',o:['暗示自己就是君子，完成邏輯閉環','讓文章寫起來更加簡潔有力','避免直接抄襲孔子的原文','讓句子讀起來更有文言感'],a:0},
{t:'mc',q:'〈陋室銘〉主要運用哪一種寫作手法來表達志向？',o:['藉陋室寄託安貧樂道的情懷','借物抒情抒發對自然喜愛','記敘手法記錄居住之環境','議論說理探討何謂君子'],a:0},
{t:'mc',q:'下列哪一項不屬於劉禹錫「德馨」的展現？',o:['家中往來皆為達官顯貴','苔痕上階綠，草色入簾青','談笑有鴻儒，往來無白丁','可以調素琴，閱金經'],a:0,exp:'德馨三面向：環境清幽、交友高雅、生活閒適。往來達官顯貴非文中之意。'},

 8: [
{t:'mc',q:'〈成功是失敗之母〉以翻轉式標題開篇，這種「先引用舊說、再翻轉出新意」的開頭方式，在議論文寫作上有何效果？',o:['先喚起讀者對舊諺語熟悉感，再翻轉製造反差導出核心論點','直接否定傳統思維，展現作者批判性','讓題目更有記憶點，方便讀者背誦','暗示本文將比較成敗孰輕孰重'],a:0,exp:'議論文開頭「先鋪墊再翻轉」的策略：先喚起讀者對「失敗為成功之母」的共鳴，再翻轉為「成功是失敗之母」，製造反差並導出全文核心論點——成功後須戒驕。'},
{t:'mc',q:'關於議論文的三要素——論點、論據、論證，下列何者正確符合〈成功是失敗之母〉一文？',o:['論點：成功後驕傲恐致失敗；論據：歷史人物事例；論證：歸納推理','論點：失敗為成功之母；論據：作者個人經歷；論證：演繹推理','論點：成功必然導致失敗；論據：報章雜誌報導；論證：數據分析','論點：驕傲是優良品質；論據：科學實驗結果；論證：類比推理'],a:0,exp:'議論文三要素：論點（本文主張「成功後驕傲恐致失敗」）、論據（引用歷史人物成功後因驕而敗的事例）、論證（從多個事例歸納出普遍道理——歸納推理）。'},
{t:'mc',q:'「居安思危」與本文觀點最相通之處為何？',o:['成功時更須警惕，否則失敗可能隨之而來','身處危險之中反而要保持冷靜','安樂生活不需過度擔憂','多思考未來便可以致富'],a:0},
{t:'tf',q:'〈成功是失敗之母〉主張成功者「必然」會遭遇失敗。',a:false,exp:'本文提醒成功後若驕傲自滿可能導致失敗，非主張必然失敗。'},
{t:'mc',q:'本文主要運用哪一種論證方式？',o:['舉例論證—引用歷史人物事例','數據論證—用統計數字支持','比喻論證—用寓言故事說理','正反論證—只呈現反面案例'],a:0},
{t:'mc',q:'〈成功是失敗之母〉在論證層次上依序為何？',o:['提出成功是失敗之母論點→列舉歷史事例→歸納成功後須戒驕','先詳細描述失敗者再說明成功者最後比較兩者','先舉反面例子再舉正面例子最後提出具體建議','先引用名人名言再解釋其意義最後呼籲實踐'],a:0,exp:'本文論證層次：首段翻轉標題提出論點，接著列舉歷史事例為論據，最後歸納出「成功後須保持警惕」。符合議論文「引論→本論→結論」的基本結構。'},
{t:'mc',q:'「謙受益，滿招損」與本文觀點的共通點是：',o:['成功後驕傲自滿將會帶來損失','謙虛謹慎就一定能夠成功','驕傲自大沒有任何壞處','吃虧就是占便宜'],a:0},
{t:'mc',q:'下列哪個成語的意涵與本文主旨最不相關？',o:['畫蛇添足（多此一舉）','驕兵必敗（驕則敗）','樂極生悲（樂極悲來）','滿招損謙受益（謙虛）'],a:0,exp:'畫蛇添足是指多此一舉，與成功後可能失敗的警惕主題無關。'},
{t:'mc',q:'下列何者最可能是本文作者想傳達的訊息？',o:['成功之後比失敗時更需要警惕','成功本身沒有任何價值可言','失敗的經驗不需要被重視','成功必然會帶來快樂'],a:0},
{t:'tf',q:'本文認為成功與失敗之間存在絕對的因果關係。',a:false,exp:'本文探討的是兩者之間的辯證關係，關鍵在於態度。'},
{t:'mc',q:'下列何者最適合作為本文的副標題？',o:['成功者的警惕——驕傲是失敗的開端','如何從失敗的深淵邁向成功','成功人生的十大心法','失敗者的自我修養手冊'],a:0},
{t:'mc',q:'〈成功是失敗之母》文中是否使用了「正反論證」？請根據文本分析。',o:['有：反面「驕傲→失敗」，暗示正面「謙虛→保持成功」，形成對比','沒有：全文只從正面論述成功可貴','有：作者並列正反事例相互對照','沒有：本文純屬抒情散文'],a:0,exp:'本文隱含正反論證：反面為「成功後驕傲→導致失敗」，正面暗示「成功後謙虛→維持成功」，雖未明寫正面案例，但透過正反對比強化論點。'},

],

function bossSay(lesson, type){
  const lines = BOSS_LINES[lesson] || BOSS_LINES['all'];
  const pool = lines[type] || lines.taunt;
  const text = pool[Math.floor(Math.random() * pool.length)];
  const bossName = BOSS_NAMES[lesson] || 'BOSS';

  // Remove old speech bubble
  const old = document.querySelector('.boss-speech');
  if(old) old.remove();

  const bubble = document.createElement('div');
  bubble.className = 'boss-speech';
  bubble.innerHTML = `<div class="bs-arrow"></div><div class="bs-name">${bossName}</div><div class="bs-text">${text}</div>`;
  $('arena').appendChild(bubble);

  // Auto remove after 3.5s
  clearTimeout(window._bsTimer);
  window._bsTimer = setTimeout(()=>{if(bubble.parentNode)bubble.remove()}, 3500);
}

};

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function $(id){return document.getElementById(id)}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

});
$('homeStart').addEventListener('click',()=>{
  const sel = document.querySelector('.lc.selected');

function startBattle(lesson){
  state.lesson = lesson;
  state.playerHP = 100;
  state.bossHP = 100;
  state.maxHP = 100;
  state.correct = 0;
  state.wrong = 0;
  state.streak = 0;
  state.score = 0;
  state.idx = 0;
  state.pending = false;

  if(lesson==='all'){
    let pool=[];
    for(let k of Object.keys(ALL_Q)) pool=pool.concat(ALL_Q[k].map(q=>({...q,src:k})));
    state.questions = shuffle(pool);
  } else {
    state.questions = shuffle([...ALL_Q[lesson]]);
  }

  $('bossNameLabel').textContent = BOSS_NAMES[lesson]||'Boss';
  showScreen('battle');
  updateHP();
  setTimeout(()=>bossSay(lesson,'intro'), 400);
  renderQ();
}

function updateHP(){
  $('playerHP').style.width = `${state.playerHP}%`;
  $('playerHPText').textContent = Math.round(state.playerHP);
  $('bossHP').style.width = `${state.bossHP}%`;
  $('bossHPText').textContent = Math.round(state.bossHP);
}

  } else {
    $('questionSlot').querySelectorAll('.tf-btn').forEach(el=>{
      el.addEventListener('click',()=>handleTF(el,q));
    });
  }
}

function handleMC(el,q){
  if(!state.pending) return;
  state.pending = false;
  const container = $('questionSlot').querySelector('.options');
  const correctIdx = parseInt(container.dataset.correct);
  const opts = container.querySelectorAll('.opt');
  opts.forEach(o=>o.classList.add('disabled'));
  const idx = parseInt(el.dataset.i);
  const isCorrect = idx === correctIdx;

  // Show answer
  opts[correctIdx].classList.add('correct');
  if(!isCorrect) el.classList.add('wrong');

  afterAnswer(isCorrect, q);
}

function handleTF(el,q){
  if(!state.pending) return;
  state.pending = false;
  const btns = $('questionSlot').querySelectorAll('.tf-btn');
  btns.forEach(b=>b.classList.add('disabled'));
  const val = el.dataset.v === 'true';
  const isCorrect = val === q.a;

  el.classList.add(isCorrect?'correct':'wrong');
  btns.forEach(b=>{
    if((b.dataset.v==='true')===q.a) b.classList.add('correct');
  });

  afterAnswer(isCorrect, q);
}

function afterAnswer(isCorrect, q){
  const arena = $('arena');
  const bossArea = $('bossHP').closest('.hp-boss');
  const playerArea = $('playerHP').closest('.hp-player');

  if(isCorrect){
    state.correct++;
    state.streak++;
    // Damage: 15 base + streak bonus
    let dmg = 15 + Math.min(state.streak * 3, 12);
    state.bossHP = Math.max(0, state.bossHP - dmg);
    state.score += dmg;

    // Visual: damage to boss
    bossArea.classList.remove('boss-shake');
    void bossArea.offsetWidth;
    bossArea.classList.add('boss-shake');
    showHitEffect('⚔️');
    showDamagePopup(bossArea, `-${dmg}`);
    bossSay(state.lesson, 'hit');

    if(state.streak >= 3){
      setTimeout(()=>showHitEffect('💥'), 200);
    }

    // Boss revival — 浮誇復活動畫
    if(state.bossHP <= 0 && state.idx < state.questions.length - 1){
      const bossArea = $('bossHP').closest('.hp-boss');
      // Screen flash
      const flash = document.createElement('div');
      flash.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle,rgba(255,215,0,0.4),rgba(255,100,0,0.2));z-index:98;pointer-events:none;animation:fbFlash .6s ease forwards';
      document.body.appendChild(flash);
      setTimeout(()=>document.body.removeChild(flash), 800);

      // Multiple explosions
      setTimeout(()=>showHitEffect('💥'), 100);
      setTimeout(()=>showHitEffect('⚡'), 200);
      setTimeout(()=>showHitEffect('🔥'), 350);

      // Boss screen shake — extra dramatic
      bossArea.classList.add('boss-shake');
      setTimeout(()=>{
        bossArea.classList.remove('boss-shake');
        bossArea.classList.add('boss-shake');
      }, 200);
      setTimeout(()=>bossArea.classList.remove('boss-shake'), 600);

      setTimeout(()=>{
        state.bossHP = 100;
        updateHP();
        showHitEffect('💫');

        // Dramatic revival overlay
        const overlay = document.createElement('div');
        overlay.className = 'hit-effect';
        overlay.style.cssText = 'font-size:100px;animation:slash .7s ease forwards;z-index:99';
        overlay.textContent = '🔥💀🔥';
        document.body.appendChild(overlay);
        setTimeout(()=>overlay.remove(), 800);

        const reviveMsg = document.createElement('div');
        reviveMsg.className = 'explain-box';
        reviveMsg.style.cssText = 'border-color:var(--gold);margin-top:8px;text-align:center;animation:pulse 0.5s ease 2';
        reviveMsg.innerHTML = '<div class="e-label" style="text-align:center;font-size:18px;color:#ffd700">🔥💀 BOSS 復活！繼續挑戰！！ 💀🔥</div>';
        bossSay(state.lesson, 'revive');
        $('questionSlot').appendChild(reviveMsg);
      }, 500);
    }
  } else {
    state.wrong++;
    state.streak = 0;
    // Boss counterattack
    let dmg = 10 + Math.floor(Math.random()*6);
    state.playerHP = Math.max(0, state.playerHP - dmg);

    playerArea.classList.remove('player-shake');
    void playerArea.offsetWidth;
    playerArea.classList.add('player-shake');
    showHitEffect('💢');
    showDamagePopup(playerArea, `-${dmg}`);
    bossSay(state.lesson, 'taunt');
  }

  updateHP();
  // Low HP taunt
  if(state.playerHP <= 30 && state.playerHP > 0){
    setTimeout(()=>bossSay(state.lesson, 'lowHP'), 800);
  }

  // Show explanation
  if(q.exp){
    let expDiv = document.createElement('div');
    expDiv.className = 'explain-box';
    expDiv.innerHTML = `<div class="e-label">${isCorrect?'✅ 解析':'💡 解析'}</div><div class="e-text">${q.exp}</div>`;
    $('questionSlot').appendChild(expDiv);
  }

  // Show next btn
  let nb = document.createElement('button');
  nb.className = 'next-btn';
  nb.textContent = isCorrect ? '➡️ 繼續出招' : '➡️ 重整旗鼓';
  $('questionSlot').appendChild(nb);
  nb.addEventListener('click',()=>{
    state.idx++;
    renderQ();
  });
}

function showHitEffect(emoji){
  const el = document.createElement('div');
  el.className = 'hit-effect';
  el.textContent = emoji;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 600);
}

function showDamagePopup(container, text){
  const el = document.createElement('div');
  el.className = 'damage-popup';
  el.textContent = text;
  el.style.color = text.startsWith('-') ? '#e85d4a' : '#5cb885';
  el.style.right = '20px';
  el.style.top = '20px';
  container.style.position = 'relative';
  container.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

function endBattle(){
  const won = state.bossHP <= 0;
  const lost = state.playerHP <= 0;

  let badge, title;
  if(won){badge='🏆';title='BOSS 擊敗！'}
  else if(lost){badge='💀';title='體力耗盡⋯'}
  else {badge='📖';title='闖關完成！'}

  const total = state.correct + state.wrong;
  const pct = total ? Math.round((state.correct/total)*100) : 0;

  showScreen('result');
  $('resBadge').textContent = badge;
  $('resTitle').textContent = title;
  $('resTitle').style.color = won ? 'var(--gold)' : lost ? 'var(--red)' : '#c0b098';

  $('resStats').innerHTML = `
    <div class="rs"><div class="n" style="color:#5cb885">${state.correct}</div><div class="l">答對</div></div>
    <div class="rs"><div class="n" style="color:#e85d4a">${state.wrong}</div><div class="l">答錯</div></div>
    <div class="rs"><div class="n" style="color:var(--gold)">${pct}%</div><div class="l">正確率</div></div>
    <div class="rs"><div class="n" style="color:#7ab0d4">${state.score}</div><div class="l">總傷害</div></div>
    <div style="grid-column:span 4;margin-top:8px">
      <div class="res-bar-wrap"><div class="res-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#b53b2c,${pct>=60?'#c9a84c':'#b53b2c'},${pct>=75?'#3a7d5a':'#c9a84c'})"></div></div>
    </div>
  `;

  $('resAgain').onclick = ()=>startBattle(state.lesson);
  $('resHome').onclick = ()=>showScreen('home');
}

// Back
$('battleBack').addEventListener('click',()=>{
  if(confirm('確定要逃離戰場嗎？（進度將遺失）')) showScreen('home');
});
</script>
</body>
</html>
