        const Monitor = createIcon('<rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>');
        const Check = createIcon('<polyline points="20 6 9 17 4 12"/>');
        const X = createIcon('<line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/>');

        const MousePointerClick = createIcon('<path d="M14 4.1 12 6"/><path d="m5.1 8-2.9-.8"/><path d="m6 12-1.9 2"/><path d="M7.2 2.2 8 5.1"/><path d="M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z"/>');
        const Menu = createIcon('<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>');

        // --- 資料與常數 ---
        const LESSONS = [
        { id: 5, title: "第五島：取材模組", subtitle: "雙軌故事摘要術", icon: <BookOpen className="w-5 h-5" />, badge: "故事圖鑑" },
        { id: 6, title: "第六島：情境開頭", subtitle: "大隊接力破題實戰", icon: <Compass className="w-5 h-5" />, badge: "破題羅盤" },
        { id: 7, title: "第七島：豹尾之勁", subtitle: "首尾呼應的餘韻", icon: <Anchor className="w-5 h-5" />, badge: "終焉船錨" },
        { id: 8, title: "第八島：文字顯微鏡", subtitle: "五感細節的擴寫", icon: <MapIcon className="w-5 h-5" />, badge: "細節透鏡" },
        { id: 9, title: "第九島：化妝術", subtitle: "長篇修辭鑑賞", icon: <Sparkles className="w-5 h-5" />, badge: "修辭寶石" },
        { id: 10, title: "第十島：沙盤推演", subtitle: "五段式結構重組", icon: <Swords className="w-5 h-5" />, badge: "戰術沙盤" },
        { id: 11, title: "第十一島：他山之石", subtitle: "神仙回饋的藝術", icon: <MessageSquare className="w-5 h-5" />, badge: "同儕之盾" },
        { id: 12, title: "第十二島：AI助教", subtitle: "精準詠唱與改寫", icon: <Monitor className="w-5 h-5" />, badge: "智慧核心" }
        ];

        const LEVEL_THRESHOLDS = [
        { level: 1, title: "見習水手", minXp: 0 },
        { level: 2, title: "文字掌舵手", minXp: 500 },
        { level: 3, title: "結構航海士", minXp: 1000 },
        { level: 4, title: "修辭大副", minXp: 1500 },
        { level: 5, title: "傳奇寫作船長", minXp: 2000 }
        ];

        // --- 共用 UI 元件 ---
        const QuestTitle = ({ children, step, title, totalSteps = 6 }) => (
        <div className="mb-8">
            <div className="flex items-center gap-3 mb-3">
            <span className="bg-amber-600 text-white text-sm font-black px-4 py-1.5 rounded-full tracking-wider shadow-sm">
                任務 {step} / {totalSteps}
            </span>
            <span className="text-amber-800 font-bold text-lg">{title}</span>
            </div>
            <h3 className="text-2xl md:text-3xl font-black text-slate-800 pb-3 border-b-2 border-amber-200 flex items-center drop-shadow-sm leading-tight">
            {children}
            </h3>
        </div>
        );

        const TeacherHint = ({ children }) => (
        <div className="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-2xl mb-8 shadow-sm relative overflow-hidden group hover:bg-blue-100 transition-colors">
            <div className="absolute -right-6 -top-6 opacity-5 group-hover:scale-110 transition-transform duration-500"><BookOpen className="w-32 h-32" /></div>
            <div className="flex flex-col md:flex-row items-start gap-4 relative z-10">
            <div className="bg-blue-600 text-white text-sm font-black px-4 py-2 rounded-lg whitespace-nowrap shadow-md mt-1 flex items-center gap-2">
                <PenTool className="w-4 h-4"/> 老師引導
            </div>
            <div className="text-blue-900 font-medium leading-relaxed text-lg pt-1">{children}</div>
            </div>
        </div>
        );

        const BackButton = ({ onClick }) => (
        <button onClick={onClick} className="mb-6 self-start text-slate-400 hover:text-amber-600 font-bold flex items-center gap-1 transition-colors bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
            <ChevronLeft className="w-5 h-5" /> 回到上一關
        </button>
        );

        const SuccessCard = ({ message, onReset }) => (
        <div className="bg-gradient-to-br from-amber-50 to-orange-50 border-2 border-amber-400 p-8 md:p-10 rounded-3xl shadow-xl mt-8 text-center animate-fade-in-up relative overflow-hidden">
            <div className="absolute top-0 right-0 w-40 h-40 bg-white opacity-20 rounded-bl-full pointer-events-none"></div>
            <div className="w-24 h-24 bg-gradient-to-br from-amber-500 to-yellow-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg border-4 border-white transform hover:rotate-12 transition-transform">
            <Award className="w-12 h-12 text-white" />
            </div>
            <h4 className="text-3xl font-black text-amber-900 mb-4">暖身成功！寫作觀念已打通 🔥</h4>
            <p className="text-amber-800 font-bold mb-8 text-xl leading-relaxed max-w-2xl mx-auto">{message}</p>
            
            <div className="bg-white p-8 rounded-2xl border-2 border-amber-300 shadow-inner mb-8 max-w-2xl mx-auto">
            <h5 className="text-2xl font-black text-slate-800 mb-4 flex items-center justify-center gap-3">
                <BookOpen className="w-8 h-8 text-amber-600 animate-bounce" />
                準備好大顯身手了嗎？
            </h5>
            <p className="text-slate-600 font-medium text-lg leading-relaxed">
                網頁的任務只是幫你搭好鷹架。<br/>
                現在請趁著手感正熱，翻開<strong className="text-amber-700 mx-1">實體講義</strong>，用筆尖在紙上完成這一堂課真正的長篇寫作挑戰吧！
            </p>
            </div>

            <div className="flex justify-center">
            <button onClick={onReset} className="px-8 py-4 rounded-xl font-bold text-amber-700 bg-amber-100 hover:bg-amber-200 transition-colors border-2 border-transparent hover:border-amber-300 shadow-sm text-lg">
                重新回顧本島觀念
            </button>
            </div>
        </div>
        );

        // --- 全新多樣化寫作遊戲引擎 ---

        // 1. 元素標記摘要遊戲 (Keyword Tagging Game) - 隱藏虛線，全文本點擊
        const TaggingGame = ({ taiwanStory, globalStory, onComplete }) => {
        const [activeTag, setActiveTag] = useState(null);
        const [taggedSegments, setTaggedSegments] = useState({ taiwan: {}, global: {} });
        const [isSuccess, setIsSuccess] = useState(false);

        const TAGS = [
            { id: 'who', label: 'WHO (人物)', bg: 'bg-blue-200', border: 'border-blue-400', text: 'text-blue-900', color: 'bg-blue-500' },
            { id: 'what', label: 'WHAT (困境)', bg: 'bg-red-200', border: 'border-red-400', text: 'text-red-900', color: 'bg-red-500' },
            { id: 'how', label: 'HOW (行動)', bg: 'bg-green-200', border: 'border-green-400', text: 'text-green-900', color: 'bg-green-500' },
            { id: 'insight', label: '體悟 (價值)', bg: 'bg-purple-200', border: 'border-purple-400', text: 'text-purple-900', color: 'bg-purple-500' }
        ];

        const handleSegmentClick = (storyKey, index) => {
            if (isSuccess) return;
            if (!activeTag) {
            alert("請先在上方點選一支「螢光筆(標籤)」，再來塗色句子喔！");
            return;
            }
            setTaggedSegments(prev => {
            const currentStoryTags = { ...prev[storyKey] };
            if (currentStoryTags[index] === activeTag) {
                delete currentStoryTags[index]; 
            } else {
                currentStoryTags[index] = activeTag;
            }
            return { ...prev, [storyKey]: currentStoryTags };
            });
        };

        const handleVerify = () => {
            const requiredTags = ['who', 'what', 'how', 'insight'];

            const checkStory = (storyData, taggedData) => {
            return requiredTags.every(tag => {
                const segIndex = storyData.segments.findIndex(s => s.id === tag);
                return taggedData[segIndex] === tag;
            }) && Object.values(taggedData).filter(t => t).length === 4;
            };

            const isTwCorrect = checkStory(taiwanStory, taggedSegments.taiwan);
            const isGlCorrect = checkStory(globalStory, taggedSegments.global);

            if (isTwCorrect || isGlCorrect) {
            setIsSuccess(true);
            } else {
            alert("標記的位置或數量不太對喔！請確認人物、困境、行動與體悟分別是哪一句話！");
            setTaggedSegments({ taiwan: {}, global: {} }); 
            }
        };

        const forceSkip = () => {
            setIsSuccess(true);
            setTimeout(onComplete, 500);
        };

        const renderStory = (storyKey, storyData) => {
            return (
            <div className={`p-6 md:p-8 rounded-2xl border-2 transition-all ${Object.keys(taggedSegments[storyKey]).length > 0 ? 'bg-amber-50/50 border-amber-300 shadow-md scale-[1.01]' : 'bg-white border-slate-200 hover:border-amber-200 hover:shadow-sm'}`}>
                <h4 className="font-black text-xl text-slate-800 mb-4 flex items-center gap-2 border-b-2 border-slate-100 pb-3">
                {storyKey === 'taiwan' ? <UserCheck className="w-6 h-6 text-blue-600" /> : <Globe className="w-6 h-6 text-emerald-600" />} 
                {storyData.name}
                </h4>
                <div className="text-lg leading-[2.5rem] text-slate-700 text-justify cursor-default">
                {storyData.segments.map((seg, index) => {
                    const isTagged = taggedSegments[storyKey][index];
                    const tagDef = TAGS.find(t => t.id === isTagged);
                    const segmentStyles = tagDef 
                    ? `${tagDef.bg} ${tagDef.text} font-bold shadow-sm rounded-md px-1.5 py-0.5 mx-0.5 cursor-pointer border border-transparent transition-all`
                    : 'hover:bg-slate-200 cursor-pointer rounded px-1 py-0.5 mx-0.5 transition-colors';

                    return (
                    <span 
                        key={index}
                        onClick={() => handleSegmentClick(storyKey, index)}
                        className={segmentStyles}
                    >
                        {seg.text}
                    </span>
                    );
                })}
                </div>
            </div>
            );
        };

        return (
            <div className="bg-slate-100/50 p-6 md:p-8 rounded-3xl border border-slate-200 shadow-sm animate-fade-in-up">
            
            {!isSuccess ? (
                <div className="bg-white p-6 rounded-2xl border-2 border-amber-200 mb-8 shadow-sm relative z-10">
                <p className="font-bold text-amber-800 mb-4 flex items-center gap-2 text-lg">
                    <MousePointerClick className="w-6 h-6 text-amber-600" /> 
                    請選出最有感觸的一篇故事。先點擊螢光筆，再點選文章句子進行塗色：
                </p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {TAGS.map(tag => (
                    <button
                        key={tag.id}
                        onClick={() => setActiveTag(tag.id)}
                        className={`p-3 rounded-xl font-black border-2 transition-all ${activeTag === tag.id ? `${tag.bg} ${tag.border} ${tag.text} scale-[1.05] shadow-md` : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}
                    >
                        {tag.label}
                    </button>
                    ))}
                </div>
                </div>
            ) : (
                <div className="p-6 rounded-xl bg-green-50 border-2 border-green-500 text-green-800 font-bold text-xl flex items-center justify-center gap-3 w-full mb-8 shadow-md animate-fade-in-up">
                <Check className="w-8 h-8" /> 摘要精準！故事結構已完美存入你的寫作資料庫。
                </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                {renderStory('taiwan', taiwanStory)}
                {renderStory('global', globalStory)}
            </div>

            {!isSuccess ? (
                <div className="flex flex-col sm:flex-row gap-4 items-center">
                <button 
                    onClick={handleVerify}
                    className={`flex-1 w-full py-4 font-black text-xl rounded-xl shadow-md transition-all flex justify-center items-center gap-3 ${
                    Object.keys(taggedSegments.taiwan).length > 0 || Object.keys(taggedSegments.global).length > 0 ? 'bg-slate-800 hover:bg-slate-700 text-amber-400' : 'bg-slate-300 text-slate-500 cursor-not-allowed'
                    }`}
                >
                    驗證摘要邏輯 <Check className="w-6 h-6" />
                </button>
                <button onClick={forceSkip} className="px-4 py-2 text-slate-400 hover:text-slate-600 font-bold flex items-center gap-1 transition-colors whitespace-nowrap">
                    <FastForward className="w-4 h-4" /> 老師跳關
                </button>
                </div>
            ) : (
                <button onClick={() => { setIsSuccess(false); onComplete(); }} className="w-full py-5 bg-gradient-to-r from-amber-500 to-yellow-400 text-slate-900 font-black text-xl rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex justify-center items-center gap-2">
                前往下一關 <ChevronRight className="w-6 h-6" />
                </button>
            )}
            </div>
        );
        };


        const HighlightTextGame = ({ paragraph, targetInstruction, correctIds, onComplete }) => {
        const [selectedIds, setSelectedIds] = useState([]);
        const [isSuccess, setIsSuccess] = useState(false);

        const toggleSelect = (id) => {
            if (isSuccess) return;
            setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
        };

        const handleCheck = () => {
            const isCorrect = correctIds.every(id => selectedIds.includes(id)) && selectedIds.length === correctIds.length;
            if (isCorrect) {
            setIsSuccess(true);
            setTimeout(onComplete, 3000);
            } else {
            alert("好像標記錯位置了喔！請仔細閱讀文章，尋找符合提示的關鍵字詞。");
            setSelectedIds([]);
            }
        };

        const forceSkip = () => {
            setIsSuccess(true);
            onComplete();
        };

        return (
            <div className="bg-white p-6 md:p-10 rounded-3xl border-2 border-amber-200 shadow-md animate-fade-in-up">
            <div className="flex items-center gap-3 mb-6 bg-slate-100 p-4 rounded-xl border border-slate-200">
                <Search className="w-6 h-6 text-amber-600 shrink-0" />
                <span className="font-bold text-lg text-slate-700">任務指令：{targetInstruction}</span>
            </div>
            
            <div className="text-lg md:text-xl leading-[2.5rem] text-slate-800 font-medium bg-[#faf8f5] p-8 rounded-2xl border-2 border-slate-200 mb-8 shadow-inner text-justify cursor-default">
                {paragraph.map((segment, index) => (
                <span 
                    key={segment.id || index}
                    onClick={() => toggleSelect(segment.id)}
                    className={`cursor-pointer transition-all duration-200 rounded px-1 py-0.5 mx-0.5 ${
                    selectedIds.includes(segment.id) 
                        ? 'bg-amber-300 text-amber-900 shadow-sm font-bold' 
                        : 'hover:bg-amber-100 text-slate-800'
                    }`}
                >
                    {segment.text}
                </span>
                ))}
            </div>

            {!isSuccess ? (
                <div className="flex flex-col sm:flex-row gap-4 items-center">
                <button 
                    onClick={handleCheck}
                    className="flex-1 w-full py-4 font-black text-xl rounded-xl shadow-md transition-all flex justify-center items-center gap-3 bg-slate-800 hover:bg-slate-700 text-amber-400"
                >
                    確認標記 <Check className="w-6 h-6" />
                </button>
                <button onClick={forceSkip} className="px-4 py-2 text-slate-400 hover:text-slate-600 font-bold flex items-center gap-1 transition-colors whitespace-nowrap">
                    <FastForward className="w-4 h-4" /> 老師跳關
                </button>
                </div>
            ) : (
                <div className="p-6 rounded-xl bg-green-50 border-2 border-green-500 text-green-800 font-bold text-xl flex items-center justify-center gap-3 animate-fade-in-up">
                <Check className="w-8 h-8" /> 鷹眼大師！完全命中！準備進入下一關...
                </div>
            )}
            </div>
        );
        };

        const OpenCompareGame = ({ template, masterVersion, masterExplanation, onComplete }) => {
        const [inputs, setInputs] = useState({});
        const [showMaster, setShowMaster] = useState(false);

        const isAllFilled = template.filter(t => typeof t === 'object').every(t => inputs[t.id] && inputs[t.id].trim().length >= (t.minLength || 5));

        const handleSubmit = () => {
            if (isAllFilled) setShowMaster(true);
            else alert("請發揮你的創意，把每個空格都填滿吧！（每個空格請至少輸入5個字喔）");
        };

        const forceSkip = () => {
            setShowMaster(true);
        };

        return (

        const OrderParagraphsGame = ({ items, correctOrder, onComplete }) => {
        const [currentOrder, setCurrentOrder] = useState([...items]);

        const move = (index, direction) => {
            const newOrder = [...currentOrder];
            if (direction === 'up' && index > 0) {
            [newOrder[index], newOrder[index - 1]] = [newOrder[index - 1], newOrder[index]];
            } else if (direction === 'down' && index < newOrder.length - 1) {
            [newOrder[index], newOrder[index + 1]] = [newOrder[index + 1], newOrder[index]];
            }
            setCurrentOrder(newOrder);
        };

        const checkOrder = () => {
            const isCorrect = currentOrder.every((item, i) => item.id === correctOrder[i]);
            if (isCorrect) onComplete();
            else alert("文章的邏輯順序還不對喔！請再調整看看！");
        };

        return (
            <div className="bg-white p-6 md:p-10 rounded-3xl border-2 border-amber-200 shadow-sm animate-fade-in-up">
            <div className="space-y-5 mb-10">

                <div key={item.id} className="flex items-start justify-between bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 shadow-sm transition-transform hover:scale-[1.01] hover:border-amber-300 group">

                        {item.text}
                    </span>
                    </div>
                    <div className="flex flex-col gap-2 shrink-0 ml-6">
                    <button onClick={() => move(index, 'up')} disabled={index === 0} className="p-3 bg-white rounded-lg border border-slate-300 disabled:opacity-30 hover:bg-slate-100 shadow-sm transition-colors">
                        <ChevronUp className="w-6 h-6 text-slate-600" />
                    </button>
                    <button onClick={() => move(index, 'down')} disabled={index === currentOrder.length - 1} className="p-3 bg-white rounded-lg border border-slate-300 disabled:opacity-30 hover:bg-slate-100 shadow-sm transition-colors">
                        <ChevronDown className="w-6 h-6 text-slate-600" />
                    </button>
                    </div>
                </div>
                ))}
            </div>
            
            <div className="flex flex-col sm:flex-row gap-4 items-center">

                驗證邏輯順序 <Check className="w-7 h-7" />
                </button>

                <FastForward className="w-4 h-4" /> 老師跳關
                </button>
            </div>
            </div>
        );

        const MakeoverMatchGame = ({ beforeTitle = "改造前 (素顏句)", afterTitle = "改造後 (大師句)", beforeItems, afterItems, onComplete }) => {
        const [selectedBefore, setSelectedBefore] = useState(null);
        const [selectedAfter, setSelectedAfter] = useState(null);
        const [matched, setMatched] = useState([]);
        const [errorLine, setErrorLine] = useState(false);

        useEffect(() => {
            if (selectedBefore && selectedAfter) {
            if (selectedBefore.matchId === selectedAfter.matchId) {
                setMatched(prev => [...prev, selectedBefore.matchId]);
                setSelectedBefore(null);
                setSelectedAfter(null);
                if (matched.length + 1 === beforeItems.length) {
                setTimeout(onComplete, 600);
                }
            } else {
                setErrorLine(true);
                setTimeout(() => {
                setSelectedBefore(null);
                setSelectedAfter(null);
                setErrorLine(false);
                }, 600);
            }
            }
        }, [selectedBefore, selectedAfter, beforeItems.length, onComplete]);

        return (
            <div className="bg-white p-6 md:p-8 rounded-3xl border-2 border-amber-200 shadow-sm animate-fade-in-up">
            <div className="flex flex-col lg:flex-row justify-between gap-8 mb-6">

                <h4 className="font-black text-slate-500 text-center mb-6 bg-slate-100 py-3 rounded-xl text-lg">{beforeTitle}</h4>
                {beforeItems.map(item => {
                    const isMatched = matched.includes(item.matchId);
                    const isSelected = selectedBefore?.id === item.id;
                    return (
                    <button
                        key={item.id}
                        disabled={isMatched}
                        onClick={() => setSelectedBefore(item)}
                        className={`w-full p-5 rounded-xl text-left border-2 transition-all shadow-sm leading-relaxed ${
                        isMatched ? 'bg-slate-50 border-slate-200 text-slate-400 opacity-50' : 
                        isSelected ? 'bg-amber-100 border-amber-500 text-amber-900 scale-[1.02] shadow-md' : 
                        errorLine && selectedBefore?.id === item.id ? 'bg-red-50 border-red-400 text-red-700 animate-shake' :
                        'bg-white border-slate-300 hover:border-amber-300 text-slate-700 font-medium hover:shadow-md'
                        }`}
                    >
                        {item.text}
                    </button>
                    );
                })}

                <div className="hidden lg:flex flex-col justify-center text-amber-300">
                <ChevronRight className="w-12 h-12 animate-pulse" />

                <div className="flex-1 space-y-4">
                <h4 className="font-black text-amber-800 text-center mb-6 bg-amber-100 py-3 rounded-xl text-lg">{afterTitle}</h4>
                {afterItems.map(item => {
                    const isMatched = matched.includes(item.matchId);
                    const isSelected = selectedAfter?.id === item.id;
                    return (
                    <button
                        key={item.id}
                        disabled={isMatched}
                        onClick={() => setSelectedAfter(item)}
                        className={`w-full p-5 rounded-xl text-left border-2 transition-all shadow-sm leading-relaxed ${
                        isMatched ? 'bg-green-50 border-green-300 text-green-700 opacity-50' : 
                        isSelected ? 'bg-amber-100 border-amber-500 text-amber-900 scale-[1.02] shadow-md' : 
                        errorLine && selectedAfter?.id === item.id ? 'bg-red-50 border-red-400 text-red-700 animate-shake' :
                        'bg-white border-slate-300 hover:border-amber-300 text-slate-800 font-bold hover:shadow-md'
                        }`}
                    >
                        {item.text}
                    </button>
                    );
                })}
                </div>
            </div>
            <div className="flex justify-end">
                <button onClick={onComplete} className="px-4 py-2 text-slate-400 hover:text-slate-600 font-bold flex items-center gap-1 transition-colors">
                <FastForward className="w-4 h-4" /> 老師跳關
                </button>
            </div>
            </div>
        );
        };

        const CategorizeGame = ({ questions, categories, onComplete }) => {
        const [currentIndex, setCurrentIndex] = useState(0);

            if (category === currentQ.answer) {

                    targetInstruction="請點擊標記出這個指令中，屬於「限制條件 (告訴AI不要做什麼)」的關鍵句。"
                    paragraph={[
                    { id: 'f1', text: "哈囉AI助教，這是我剛寫完的會考作文草稿，題目是「青澀的印記」。", isSelectable: true },
                    { id: 'f2', text: "請先幫我檢查全文是否有錯別字或是不通順的語句。", isSelectable: true },
                    { id: 'f3', text: " 另外，我覺得第三段的情感描寫太過平淡，缺乏畫面感。", isSelectable: true },
                    { id: 'f4', text: "請提供兩個具象化的「修辭範例」讓我參考。", isSelectable: true },
                    { id: 'f5', text: " 請注意，", isSelectable: true },
                    { id: 'c1', text: "千萬不要直接幫我重寫整段文章，我要自己做最終修改。", isSelectable: true }
                    ]}
                    correctIds={['c1']}
                    onComplete={() => { onStepComplete(); setStep(4); }}
                />
                </div>
            )}

            {step === 4 && (
                <div>
                <QuestTitle step={4} title="分類遊戲">指令素質鑑定</QuestTitle>
                <TeacherHint>
                    詠唱咒語時，差一個字效果差很多。請判斷以下是對AI下的「優質指令」還是會讓你失去思考能力的「糟糕指令」？
                </TeacherHint>
                <CategorizeGame 
                    questions={[
                    { text: "「請幫我寫一篇關於『朋友』的作文，要有起承轉合，字數600字。」", answer: "糟糕的指令" },
                    { text: "「這是我寫的草稿。請幫我挑出語意不通順的地方，並解釋為什麼不通順。」", answer: "優質的指令" },
                    { text: "「我覺得我這段寫得很爛，幫我用華麗的詞藻重寫整段。」", answer: "糟糕的指令" }
                    ]}
                    categories={["優質的指令", "糟糕的指令"]}
                    onComplete={() => { onStepComplete(); setStep(5); }}
                />
                </div>
            )}

            {step === 5 && (
                <div>
                <QuestTitle step={5} title="開放式微整形 (一)">量身打造專屬咒語</QuestTitle>
                <TeacherHint>
                    不要只會用「幫我寫」這種懶惰指令。請根據你目前寫作最常遇到的困難，填入空格，打造一個能真正幫助你進步的咒語。
                </TeacherHint>
                <OpenCompareGame 
                    template={[
                    "AI助教你好，這是我寫的一段關於「面對挫折」的草稿。我目前最大的困難是 ", { id: 'problem', placeholder: '你寫作的弱點', hint: '例如：只會寫大道理，沒有真實的故事感', minLength: 5 },
                    " 。請你扮演一位嚴格但有耐心的國文老師，先針對我的文章提出 ", { id: 'task1', placeholder: '具體的檢視任務', hint: '例如：結構上哪裡不連貫的分析', minLength: 5 },
                    " 。接著，請用提問的方式，引導我思考 ", { id: 'task2', placeholder: '希望AI引導你思考的方向', hint: '例如：如何加入更多視覺細節', minLength: 5 }, "，讓我能自己動筆修改。"
                    ]}
                    masterVersion="AI助教你好，這是我寫的一段關於「面對挫折」的草稿。我目前最大的困難是【詞彙量太少，寫出來的句子總是很乾癟】。請你扮演一位嚴格但有耐心的國文老師，先針對我的文章提出【三個可以替換的高級同義詞或成語建議】。接著，請用提問的方式，引導我思考【如何把「我很痛苦」這個概念，轉化為具體的身體動作描寫】，讓我能自己動筆修改。"
                    masterExplanation="這個指令非常完美！你明確指出了自己的弱點，設定了AI的角色（老師），給予了具體任務（同義詞建議），最重要的是，你要求AI「引導」你，而不是「代替」你思考。"
                    onComplete={() => { onStepComplete(); setStep(6); }}
                />
                </div>
            )}

            {step === 6 && (
                <div>
                <QuestTitle step={6} title="開放式微整形 (二)">請AI幫忙找靈感</QuestTitle>
                <TeacherHint>
                    當你拿到一個很抽象的題目，完全沒有頭緒時，可以請AI幫你「Brainstorm (腦力激盪)」，但要設定好框架。
                </TeacherHint>
                <OpenCompareGame 
                    template={[
                    "AI助教，我正在準備會考作文，題目是「我們這個世代」。我不想寫很常見的手機或網路成癮。請提供我 ", { id: 'task', placeholder: '要求提供的數量與類型', hint: '例如：三個不同切入點的真實生活場景', minLength: 5 },
                    " 來作為寫作靈感。這些場景必須符合 ", { id: 'condition1', placeholder: '限制條件一', hint: '例如：國中生在校園或家庭的日常經驗', minLength: 5 },
                    " ，並且能帶出 ", { id: 'condition2', placeholder: '限制條件二(立意)', hint: '例如：我們這代人獨有的壓力與焦慮', minLength: 5 }, " 的核心觀點。請條列式給我，不要直接寫成文章。"
                    ]}
                    masterVersion="AI助教，我正在準備會考作文，題目是「我們這個世代」。我不想寫很常見的手機或網路成癮。請提供我【三個不同切入點且具備強烈畫面感的真實生活場景】來作為寫作靈感。這些場景必須符合【台灣國中生在校園、補習班或家庭的日常經驗】，並且能帶出【我們這代人看似資源豐富，實則對未來充滿未知與焦慮】的核心觀點。請條列式給我，不要直接寫成文章。"
                    masterExplanation="這是一個極度專業的「Brainstorming」指令。你排除了老套的題材（網路成癮），限制了場景的真實性（台灣國中生），並給定了你想探討的深度（焦慮感）。AI 給出的靈感絕對會非常精準且可用！"
                    onComplete={() => { if(!isCompleted) onComplete(); setStep(7); }}
                />
                </div>
            )}

            {step === 7 && <SuccessCard message="你已經懂得如何與AI協作，成為駕馭工具的新時代創作者了！" onReset={handleReset} />}
            </div>
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
